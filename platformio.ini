[platformio]
default_envs = waveshare_esp32s3_poe_8di_8ro

[env:waveshare_esp32s3_poe_8di_8ro]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.flash_mode = dio
board_build.partitions = partitions.csv
extra_scripts = pre:scripts/generate_version_header.py
build_flags =
    -D CONFIG_CZONE_CAN_BITRATE_KBPS=250
    -Wall
    -Wextra
