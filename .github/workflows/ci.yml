name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini', 'sdkconfig.defaults', 'dependencies.lock') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build
        run: pio run

      - name: Collect build outputs
        run: |
          mkdir -p artifacts
          for f in firmware.bin firmware.elf bootloader.bin partitions.bin; do
            cp .pio/build/*/"$f" "artifacts/$f" 2>/dev/null || true
          done

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: artifacts/
          if-no-files-found: error
